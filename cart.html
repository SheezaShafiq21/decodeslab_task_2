<!DOCTYPE html>

<head>
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Amore | Shopping Cart</title>

    <link rel="stylesheet" href="cart.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<section class="cartback">

     <header>
        <img class="logo" src="cof.png">
        <nav>
             <a href="task1.html">  Home   </a>
             <a href="story.html" >Our  Story</a>
             <a href="menu.html" >  Menu</a>
             <a href="contact.html ">  Contact</a>
        </nav> 
        <a href="cart.html" class="cart"> <i class="fa-solid fa-cart-shopping"></i></a>
      </header>


<main class="container">

    <section class="left">

        <h2>Customer Information</h2>

        <input type="text" placeholder="Full Name" required>

        <input type="email" placeholder="Email Address" required>

        <input type="tel" placeholder="Phone Number" required>

        <textarea placeholder="Delivery Address" rows="5"></textarea>


        <h2>Payment Method</h2>

        <label>
            <input type="radio" name="payment" checked>
            Cash on Delivery
        </label>

        <label>
            <input type="radio" name="payment">
            Credit / Debit Card
        </label>

    </section>



    <section class="right">

        <h2>Order Summary</h2>

        <article class="item">
            <span>Cappuccino</span>
            <span>Rs. 650</span>
        </article>


        <article class="item">
            <span>Classic Mocha</span>
            <span>Rs. 750</span>
        </article>


        <hr>


        <article class="total">
            <span>Total</span>
            <span>Rs. 1400</span>
        </article>


        <a href="thanku.html" class="btn">
            Complete Order
        </a>

    </section>

</main>

 <footer>
     <div class="heading">Contact Us</div>

    <a href="#" ><p><i class="fa-solid fa-phone"></i> +92 300 1234567</p></a>

    <a href="#" ><p><i class="fa-solid fa-envelope"></i> cafeamore@gmail.com</p></a>
    

    <div class="social">

        <a href="#"><i class="fa-brands fa-instagram"></i></a>

        <a href="#"><i class="fa-brands fa-facebook"></i></a>

    </div>

</footer>

</section>
</body>
</html>
